<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>주간보고 — 정지원</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f7f7f5;
    --bg3: #f0efeb;
    --text: #1a1a1a;
    --text2: #6b6b6b;
    --text3: #a0a0a0;
    --border: rgba(0,0,0,0.09);
    --border2: rgba(0,0,0,0.16);
    --border3: rgba(0,0,0,0.24);
    --radius: 8px;
    --radius-lg: 12px;
    --font: 'Pretendard', -apple-system, sans-serif;

    --blue-bg: #E6F1FB; --blue-text: #0C447C;
    --green-bg: #E1F5EE; --green-text: #085041;
    --amber-bg: #FAEEDA; --amber-text: #633806;
    --red-bg: #FCEBEB; --red-text: #791F1F;
    --gray-bg: #F1EFE8; --gray-text: #444441;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a; --bg2: #232323; --bg3: #2c2c2a;
      --text: #f0f0f0; --text2: #a0a0a0; --text3: #666;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14); --border3: rgba(255,255,255,0.22);
      --blue-bg: #0c2a45; --blue-text: #85B7EB;
      --green-bg: #042c20; --green-text: #5DCAA5;
      --amber-bg: #2e1e06; --amber-text: #FAC775;
      --red-bg: #2e0f0f; --red-text: #F09595;
      --gray-bg: #2c2c2a; --gray-text: #B4B2A9;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; }
  body { font-family: var(--font); background: var(--bg3); color: var(--text); min-height: 100vh; }

  .shell { max-width: 680px; margin: 0 auto; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .header { padding: 16px 20px 0; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .app-logo { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .week-nav { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .nav-btn { width: 30px; height: 30px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); cursor: pointer; font-size: 15px; color: var(--text2); display: flex; align-items: center; justify-content: center; transition: background .15s; }
  .nav-btn:hover { background: var(--bg3); }
  .week-label { font-size: 13px; color: var(--text2); font-weight: 500; min-width: 80px; text-align: center; }
  .save-dot { width: 7px; height: 7px; border-radius: 50%; background: #639922; flex-shrink: 0; }

  .tab-bar { display: flex; overflow-x: auto; scrollbar-width: none; gap: 0; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab { padding: 10px 16px; font-size: 13px; font-weight: 400; color: var(--text3); border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: color .15s; font-family: var(--font); }
  .tab.active { color: var(--text); font-weight: 500; border-bottom-color: var(--text); }

  /* Content */
  .pane { padding: 16px 16px 80px; flex: 1; }

  /* Add form */
  .add-form { background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .add-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .fi-wrap { border-bottom: 0.5px solid var(--border); }
  .fi-wrap:nth-child(odd) { border-right: 0.5px solid var(--border); }
  .fi-wrap.full { grid-column: 1 / -1; }
  .fi-label { font-size: 10px; font-weight: 600; color: var(--text3); padding: 8px 12px 2px; letter-spacing: 0.5px; text-transform: uppercase; }
  .fi { width: 100%; font-size: 14px; padding: 4px 12px 10px; border: none; background: transparent; color: var(--text); font-family: var(--font); appearance: none; -webkit-appearance: none; }
  .fi:focus { outline: none; }
  select.fi { cursor: pointer; }
  .add-btn-wrap { padding: 12px; }
  .add-btn { width: 100%; padding: 11px; font-size: 14px; font-weight: 600; border-radius: var(--radius); border: none; background: var(--text); color: var(--bg); cursor: pointer; font-family: var(--font); letter-spacing: -0.2px; transition: opacity .15s; }
  .add-btn:active { opacity: .75; }

  /* View toggle */
  .view-toggle { display: flex; gap: 6px; margin-bottom: 14px; }
  .vtab { padding: 5px 14px; font-size: 12px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; cursor: pointer; color: var(--text2); font-family: var(--font); transition: all .15s; }
  .vtab.on { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* Day groups */
  .day-group { margin-bottom: 20px; }
  .day-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .day-lbl { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.3px; }
  .day-rule { flex: 1; height: 0.5px; background: var(--border); }
  .day-count { font-size: 11px; color: var(--text3); }

  /* Task cards */
  .task-card { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: var(--radius); border: 0.5px solid transparent; transition: background .12s, border-color .12s; cursor: grab; user-select: none; }
  .task-card:hover { background: var(--bg2); }
  .task-card.dragging { opacity: .35; }
  .task-card.drag-over { border-color: var(--border3); background: var(--bg2); }
  .drag-handle { font-size: 12px; color: var(--text3); flex-shrink: 0; margin-top: 3px; opacity: 0; transition: opacity .15s; cursor: grab; line-height: 1; }
  .task-card:hover .drag-handle { opacity: 1; }

  .cb { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border3); background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all .18s; }
  .cb.checked { background: var(--text); border-color: var(--text); }
  .cb.checked::after { content: ''; display: block; width: 10px; height: 10px; background: var(--bg); clip-path: polygon(14% 44%,0 65%,50% 100%,100% 16%,80% 0%,43% 62%); }

  .task-body { flex: 1; min-width: 0; }
  .task-text { font-size: 14px; color: var(--text); line-height: 1.5; word-break: break-word; transition: color .15s; cursor: text; }
  .task-text.done { text-decoration: line-through; color: var(--text3); }
  .task-text.editing { display: none; }
  .task-inline-input { font-size: 14px; color: var(--text); line-height: 1.5; width: 100%; border: none; border-bottom: 1.5px solid var(--border3); background: transparent; font-family: var(--font); padding: 0 0 2px; outline: none; display: none; }
  .task-inline-input.active { display: block; }
  .task-chips { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
  .chip { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
  .chip-client { background: var(--bg3); color: var(--text2); }
  .chip-gov { background: var(--blue-bg); color: var(--blue-text); }
  .chip-sub { background: var(--green-bg); color: var(--green-text); }
  .chip-next { background: var(--amber-bg); color: var(--amber-text); }
  .chip-issue { background: var(--red-bg); color: var(--red-text); }
  .chip-etc { background: var(--gray-bg); color: var(--gray-text); }
  .chip-carried { background: var(--amber-bg); color: var(--amber-text); }
  .pri-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }

  .task-actions { display: flex; gap: 2px; flex-shrink: 0; opacity: 0; transition: opacity .15s; }
  .task-card:hover .task-actions { opacity: 1; }
  .ia { width: 26px; height: 26px; border: none; background: transparent; cursor: pointer; border-radius: var(--radius); color: var(--text3); font-size: 13px; display: flex; align-items: center; justify-content: center; transition: background .12s; }
  .ia:hover { background: var(--bg3); color: var(--text2); }
  .ia.del:hover { color: #E24B4A; }

  .new-client-inline { display:none; grid-column:1/-1; background:var(--bg2); border-radius:var(--radius); padding:10px 12px; gap:8px; flex-wrap:wrap; align-items:center; border:0.5px solid var(--border2); }
  .new-client-inline.open { display:flex; }
  .new-client-inline .nci { font-size:13px; padding:6px 10px; border:0.5px solid var(--border2); border-radius:var(--radius); background:var(--bg); color:var(--text); font-family:var(--font); flex:1; min-width:90px; }
  .new-client-inline .nci:focus { outline:none; border-color:var(--border3); }
  .new-client-inline .nci-sel { appearance:none; -webkit-appearance:none; cursor:pointer; }
  .nci-save { padding:6px 14px; font-size:13px; font-weight:500; border-radius:var(--radius); border:none; background:var(--text); color:var(--bg); cursor:pointer; font-family:var(--font); white-space:nowrap; }
  .nci-cancel { padding:6px 10px; font-size:13px; border-radius:var(--radius); border:0.5px solid var(--border2); background:transparent; color:var(--text2); cursor:pointer; font-family:var(--font); }
  .nci-label { font-size:11px; font-weight:600; color:var(--text2); white-space:nowrap; letter-spacing:0.3px; }
  .attach-item { display: flex; align-items: center; gap: 5px; padding: 3px 8px 3px 6px; background: var(--red-bg); border-radius: 8px; font-size: 11px; color: var(--red-text); cursor: pointer; max-width: 200px; }
  .attach-item:hover { opacity: .8; }
  .attach-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
  .attach-del { font-size: 11px; color: var(--red-text); opacity: .6; flex-shrink: 0; }
  .attach-del:hover { opacity: 1; }
  .attach-img-thumb { width: 14px; height: 14px; border-radius: 2px; object-fit: cover; flex-shrink: 0; }

  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; line-height: 1.8; }

  /* Report */
  .rs-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 10px; }
  .rs-head { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .rs-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .rs-item { font-size: 14px; color: var(--text); padding: 3px 0; line-height: 1.6; }
  .rs-none { font-size: 13px; color: var(--text3); font-style: italic; }
  .copy-btn { width: 100%; padding: 13px; font-size: 14px; font-weight: 600; border-radius: var(--radius-lg); border: none; background: var(--text); color: var(--bg); cursor: pointer; font-family: var(--font); margin-top: 12px; transition: opacity .15s; }
  .copy-btn:active { opacity: .75; }

  /* Stats */
  .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
  @media (min-width: 480px) { .stat-grid { grid-template-columns: repeat(4, 1fr); } }
  .stat-card { background: var(--bg2); border-radius: var(--radius-lg); padding: 14px; }
  .stat-lbl { font-size: 11px; color: var(--text3); margin-bottom: 4px; font-weight: 500; }
  .stat-val { font-size: 26px; font-weight: 600; color: var(--text); letter-spacing: -1px; }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .chart-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 12px; }
  .chart-lbl { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 14px; }

  /* Settings */
  .settings-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 12px; }
  .settings-head { font-size: 12px; font-weight: 600; color: var(--text2); padding: 12px 16px; border-bottom: 0.5px solid var(--border); letter-spacing: 0.3px; text-transform: uppercase; }
  .cl-group { margin-bottom: 10px; border-radius: var(--radius-lg); overflow: hidden; border: 0.5px solid var(--border); }
  .cl-group-head { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--bg2); border-bottom: 0.5px solid var(--border); }
  .cl-group-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cl-group-label { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: 0.3px; text-transform: uppercase; flex: 1; }
  .cl-group-count { font-size: 11px; color: var(--text3); }
  .cl-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 0.5px solid var(--border); background: var(--bg); }
  .cl-row:last-child { border-bottom: none; }
  .cl-name { font-size: 13px; font-weight: 500; flex: 1; color: var(--text); }
  .cl-sel { font-size: 12px; padding: 4px 8px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-family: var(--font); appearance: none; -webkit-appearance: none; cursor: pointer; }
  .cl-del { width: 26px; height: 26px; border: none; background: transparent; cursor: pointer; border-radius: var(--radius); color: var(--text3); font-size: 13px; display: flex; align-items: center; justify-content: center; }
  .cl-del:hover { color: #E24B4A; }
  .add-client-row { display: flex; gap: 8px; padding: 12px 16px; flex-wrap: wrap; }
  .add-client-row .fi2 { font-size: 13px; padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-family: var(--font); appearance: none; -webkit-appearance: none; }
  .add-client-row .fi2:focus { outline: none; border-color: var(--border3); }
  .small-btn { padding: 8px 14px; font-size: 13px; font-weight: 500; border-radius: var(--radius); border: none; background: var(--text); color: var(--bg); cursor: pointer; font-family: var(--font); white-space: nowrap; }

  /* Edit modal */
  .modal-backdrop { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; align-items:flex-end; justify-content:center; }
  .modal-backdrop.open { display:flex; }
  .modal { background:var(--bg); border-radius:var(--radius-lg) var(--radius-lg) 0 0; width:100%; max-width:680px; padding:20px 16px 32px; }
  .modal-title { font-size:14px; font-weight:600; color:var(--text); margin-bottom:16px; }
  .modal-field { margin-bottom:12px; }
  .modal-label { font-size:11px; font-weight:600; color:var(--text3); letter-spacing:0.4px; text-transform:uppercase; margin-bottom:5px; }
  .modal-input { width:100%; font-size:14px; padding:9px 12px; border:0.5px solid var(--border2); border-radius:var(--radius); background:var(--bg2); color:var(--text); font-family:var(--font); }
  .modal-input:focus { outline:none; border-color:var(--border3); }
  select.modal-input { appearance:none; -webkit-appearance:none; cursor:pointer; }
  .modal-row { display:flex; gap:8px; }
  .modal-row .modal-field { flex:1; }
  .modal-btns { display:flex; gap:8px; margin-top:16px; }
  .modal-save { flex:1; padding:11px; font-size:14px; font-weight:600; border-radius:var(--radius); border:none; background:var(--text); color:var(--bg); cursor:pointer; font-family:var(--font); }
  .modal-cancel { padding:11px 18px; font-size:14px; border-radius:var(--radius); border:0.5px solid var(--border2); background:transparent; color:var(--text2); cursor:pointer; font-family:var(--font); }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: 20px; display: none; z-index: 999; font-family: var(--font); white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }

  @media (max-width: 480px) {
    .pane { padding: 12px 12px 80px; }
    .task-actions { opacity: 1; }
    .drag-handle { opacity: 0.4; }
    .header { padding: 14px 16px 0; }
  }
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-top">
      <span class="app-logo">주간보고</span>
      <div class="week-nav">
        <button class="nav-btn" onclick="chWk(-1)">‹</button>
        <span class="week-label" id="wkLabel"></span>
        <button class="nav-btn" onclick="chWk(1)">›</button>
      </div>
      <span class="save-dot" id="saveDot" title="자동저장"></span>
    </div>
    <div class="tab-bar">
      <button class="tab active" onclick="setTab(this,'daily')">데일리 업무</button>
      <button class="tab" onclick="setTab(this,'report')">주간보고서</button>
      <button class="tab" onclick="setTab(this,'monthly')">월간 성과</button>
      <button class="tab" onclick="setTab(this,'settings')">설정</button>
    </div>
  </div>

  <div class="pane" id="pane-daily">
    <div class="add-form">
      <div class="add-form-grid">
        <div class="fi-wrap">
          <div class="fi-label">날짜</div>
          <input type="date" class="fi" id="f-date">
        </div>
        <div class="fi-wrap">
          <div class="fi-label">고객사</div>
          <select class="fi" id="f-client" onchange="onCC()">
            <option value="">선택 안함 (기타)</option>
          </select>
        </div>
      </div>
      <div class="new-client-inline" id="new-client-inline">
        <span class="nci-label">신규 고객사</span>
        <input class="nci" id="nci-name" placeholder="고객사 이름" onkeydown="if(event.key==='Enter'){event.preventDefault();saveInlineClient()}">
        <select class="nci nci-sel" id="nci-sec">
          <option value="gov">정부/민간</option>
          <option value="sub">구독제</option>
          <option value="issue">이슈</option>
          <option value="etc">기타</option>
        </select>
        <button class="nci-save" onclick="saveInlineClient()">추가</button>
        <button class="nci-cancel" onclick="cancelInlineClient()">취소</button>
      </div>
      <div class="add-form-grid" style="border-top:0.5px solid var(--border)">
        <div class="fi-wrap">
          <div class="fi-label">구분</div>
          <select class="fi" id="f-type" onchange="onCC()">
            <option value="today">오늘 할일</option>
            <option value="nextweek">차주 예정</option>
            <option value="issue">이슈사항</option>
          </select>
        </div>
        <div class="fi-wrap">
          <div class="fi-label">우선순위</div>
          <select class="fi" id="f-pri">
            <option value="mid">보통</option>
            <option value="high">높음 ●</option>
            <option value="low">낮음 ●</option>
          </select>
        </div>
        <div class="fi-wrap full">
          <div class="fi-label">업무 내용</div>
          <input class="fi" id="f-content" placeholder="업무 내용을 입력하세요" onkeyup="handleKey(event)">
        </div>
      </div>
      <div class="add-btn-wrap">
        <button class="add-btn" onclick="addTask()">추가하기</button>
      </div>
    </div>
    <div class="view-toggle">
      <button class="vtab on" data-v="day" onclick="setView(this,'day')">오늘</button>
      <button class="vtab" data-v="week" onclick="setView(this,'week')">주간</button>
    </div>
    <div id="task-list"></div>
  </div>

  <div class="pane" id="pane-report" style="display:none">
    <div id="report-body"></div>
    <button class="copy-btn" onclick="copyReport()">클립보드에 복사</button>
  </div>

  <div class="pane" id="pane-monthly" style="display:none">
    <div class="stat-grid" id="monthly-stats"></div>
    <div class="chart-card">
      <div class="chart-lbl">주차별 완료 업무</div>
      <div style="position:relative;height:180px"><canvas id="chart-weekly"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-lbl">고객사별 업무 비중</div>
      <div id="client-chart-wrap" style="position:relative"><canvas id="chart-client"></canvas></div>
    </div>
  </div>

  <div class="pane" id="pane-settings" style="display:none">
    <div class="settings-card">
      <div class="settings-head">내 이름</div>
      <div style="display:flex;align-items:center;gap:10px;padding:12px 16px">
        <input class="fi2" id="s-username" placeholder="홍길동" style="flex:1"
          onkeydown="if(event.key==='Enter'&&!event.isComposing){event.preventDefault();saveName()}"
          oninput="saveName()">
        <span style="font-size:12px;color:var(--text3)">주간보고서 제목에 사용돼요</span>
      </div>
    </div>
    <div class="settings-card">
      <div class="settings-head">고객사 목록</div>
      <div id="cl-list"></div>
      <div class="add-client-row">
        <input class="fi2" id="nc-name" placeholder="고객사 이름" style="flex:1;min-width:80px" onkeydown="if(event.key==='Enter'){event.preventDefault();addClient()}">
        <select class="fi2" id="nc-sec">
          <option value="gov">정부/민간</option>
          <option value="sub">구독제</option>
          <option value="issue">이슈</option>
          <option value="etc">기타</option>
        </select>
        <button class="small-btn" onclick="addClient()">추가</button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop" id="editModal" onclick="closeEdit(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">업무 편집</div>
    <div class="modal-field">
      <div class="modal-label">업무 내용</div>
      <input class="modal-input" id="e-content" onkeydown="if(event.key==='Enter'){event.preventDefault();saveEdit()}">
    </div>
    <div class="modal-row">
      <div class="modal-field">
        <div class="modal-label">날짜</div>
        <input type="date" class="modal-input" id="e-date">
      </div>
      <div class="modal-field">
        <div class="modal-label">고객사</div>
        <select class="modal-input" id="e-client"></select>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-field">
        <div class="modal-label">구분</div>
        <select class="modal-input" id="e-type">
          <option value="today">오늘 할일</option>
          <option value="nextweek">차주 예정</option>
          <option value="issue">이슈사항</option>
        </select>
      </div>
      <div class="modal-field">
        <div class="modal-label">우선순위</div>
        <select class="modal-input" id="e-pri">
          <option value="mid">보통</option>
          <option value="high">높음</option>
          <option value="low">낮음</option>
        </select>
      </div>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeEdit()">취소</button>
      <button class="modal-save" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const DAYS=['일','월','화','수','목','금','토'];
const SEC_ORDER=['gov-done','sub-done','gov-next','sub-next','issue','etc'];
const SEC_LBL={'gov-done':'정부/민간 금주 완료 업무','sub-done':'구독제 금주 완료 업무','gov-next':'정부/민간 차주 예정 업무','sub-next':'구독제 차주 예정 업무','issue':'이슈사항','etc':'기타'};
const SEC_DOT={'gov-done':'#378ADD','sub-done':'#1D9E75','gov-next':'#3B6D11','sub-next':'#3B6D11','issue':'#E24B4A','etc':'#888780'};
const SEC_CHIP={'gov-done':'chip-gov','sub-done':'chip-sub','gov-next':'chip-next','sub-next':'chip-next','issue':'chip-issue','etc':'chip-etc'};
const BASE_S={'gov':'정부/민간','sub':'구독제','issue':'이슈','etc':'기타'};
const PRI_COLOR={'high':'#E24B4A','mid':'#EF9F27','low':'#97C459'};

let wkOff=0,wk='',todayStr='';
let S={clients:{},tasks:{}};
let curView='day';
let dragId=null;
let chartW=null,chartC=null;

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;')}
function load(){try{const r=localStorage.getItem('wr6');if(r)S=JSON.parse(r)}catch(_){}}
function save(){
  try{localStorage.setItem('wr6',JSON.stringify(S))}catch(_){}
  const d=document.getElementById('saveDot');
  d.style.background='#639922';
  setTimeout(()=>d.style.background='#639922',1000);
}
function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.style.display='block';
  setTimeout(()=>t.style.display='none',2000);
}

function localDate(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function getWkKey2(off){
  const d=new Date();
  const dow=d.getDay();
  d.setDate(d.getDate()-(dow===0?6:dow-1)+off*7);
  return localDate(d);
}
function getWkLabel(k){const d=new Date(k+'T00:00:00');return `${d.getMonth()+1}월 ${Math.ceil(d.getDate()/7)}주차`}
function getFullLabel(k){const d=new Date(k+'T00:00:00');return `${S.username||'홍길동'} ${d.getMonth()+1}월 ${Math.ceil(d.getDate()/7)}주차 주간보고`}
function fmtD(dk){const d=new Date(dk+'T00:00:00');return `${d.getMonth()+1}/${d.getDate()} (${DAYS[d.getDay()]})`}

function chWk(d){wkOff+=d;init()}

function handleKey(ev){if(ev.key==='Enter'&&!ev.isComposing){addTask()}}

let editId=null;
function openEdit(id){
  const t=(S.tasks[wk]||[]).find(x=>String(x.id)===String(id));
  if(!t)return;
  editId=String(id);
  document.getElementById('e-content').value=t.content||'';
  document.getElementById('e-date').value=t.date||todayStr;
  document.getElementById('e-pri').value=t.pri||'mid';
  document.getElementById('e-type').value=t.isNext?'nextweek':'today';
  const sel=document.getElementById('e-client');
  sel.innerHTML='<option value="">선택 안함 (기타)</option>';
  Object.keys(S.clients).forEach(n=>{
    const o=document.createElement('option');
    o.value=n;o.textContent=n;
    if(n===t.client)o.selected=true;
    sel.appendChild(o);
  });
  document.getElementById('editModal').classList.add('open');
  setTimeout(()=>document.getElementById('e-content').focus(),100);
}
function closeEdit(ev){
  if(ev&&ev.target!==document.getElementById('editModal'))return;
  document.getElementById('editModal').classList.remove('open');
  editId=null;
}
function saveEdit(){
  const t=(S.tasks[wk]||[]).find(x=>String(x.id)===String(editId));
  if(!t)return;
  const content=document.getElementById('e-content').value.trim();
  if(!content)return;
  const clientVal=document.getElementById('e-client').value;
  const typeVal=document.getElementById('e-type').value;
  t.content=content;
  t.date=document.getElementById('e-date').value||todayStr;
  t.pri=document.getElementById('e-pri').value;
  t.isNext=(typeVal==='nextweek');
  t.client=clientVal||'';
  t.base=(typeVal==='issue')?'issue':clientVal?(S.clients[clientVal]||'etc'):'etc';
  document.getElementById('editModal').classList.remove('open');
  editId=null;
  save();renderDaily();toast('수정됐어요');
}

function resolveSec(base,type){
  if(base==='issue')return 'issue';
  if(base==='etc')return 'etc';
  return base+(type==='nextweek'?'-next':'-done');
}
function taskSec(t){
  if(t.base==='issue')return 'issue';
  if(t.base==='etc')return 'etc';
  if(t.isNext)return t.base+'-next';
  if(t.done)return t.base+'-done';
  return t.base+'-next';
}

function onCC(){
  const v=document.getElementById('f-client').value;
  if(v==='__new__'){
    document.getElementById('new-client-inline').classList.add('open');
    document.getElementById('f-client').value='';
    setTimeout(()=>document.getElementById('nci-name').focus(),50);
  }
}

function renderClientSel(selectVal){
  const sel=document.getElementById('f-client');
  sel.innerHTML='<option value="">선택 안함 (기타)</option>';
  Object.keys(S.clients).forEach(n=>{
    const o=document.createElement('option');
    o.value=n;o.textContent=n;
    if(selectVal&&n===selectVal)o.selected=true;
    sel.appendChild(o);
  });
  const sep=document.createElement('option');
  sep.disabled=true;sep.textContent='──────────';
  sel.appendChild(sep);
  const add=document.createElement('option');
  add.value='__new__';add.textContent='+ 신규 고객사 추가';
  sel.appendChild(add);
}

function saveInlineClient(){
  const name=document.getElementById('nci-name').value.trim();
  if(!name){document.getElementById('nci-name').focus();return;}
  const sec=document.getElementById('nci-sec').value;
  S.clients[name]=sec;
  document.getElementById('nci-name').value='';
  document.getElementById('new-client-inline').classList.remove('open');
  save();
  renderClientSel(name);
  renderClSettings();
  toast(`'${name}' 고객사가 추가됐어요`);
}
function cancelInlineClient(){
  document.getElementById('nci-name').value='';
  document.getElementById('new-client-inline').classList.remove('open');
}

function mkId(){return 'id_'+Date.now()+'_'+Math.floor(Math.random()*100000)}

function addTask(){
  const dateVal=document.getElementById('f-date').value||todayStr;
  let clientVal=document.getElementById('f-client').value;
  const type=document.getElementById('f-type').value;
  const pri=document.getElementById('f-pri').value;
  const content=document.getElementById('f-content').value.trim();
  if(!content)return;

  let client,base,isNext,isIssue;
  isIssue=(type==='issue');
  isNext=(type==='nextweek');

  if(!clientVal){
    client='';
    base=isIssue?'issue':'etc';
  } else {
    client=clientVal;
    base=isIssue?'issue':(S.clients[clientVal]||'etc');
  }

  if(!S.tasks[wk])S.tasks[wk]=[];
  S.tasks[wk].push({
    id:mkId(),
    content,client,base,pri,
    done:false,
    isNext,
    date:dateVal,
    carriedFrom:null,
    order:S.tasks[wk].length,
    files:[]
  });
  document.getElementById('f-content').value='';
  save();renderDaily();
}

function startInlineEdit(id, textEl){
  const t=(S.tasks[wk]||[]).find(x=>String(x.id)===String(id));
  if(!t||t.done)return;
  const card=textEl.closest('.task-card');
  card.setAttribute('draggable','false');
  const input=card.querySelector('.task-inline-input');
  input.value=t.content||'';
  textEl.classList.add('editing');
  input.classList.add('active');
  input.focus();
  input.select();
}
function commitInlineEdit(id, inputEl){
  const t=(S.tasks[wk]||[]).find(x=>String(x.id)===String(id));
  if(!t)return;
  const val=inputEl.value.trim();
  const card=inputEl.closest('.task-card');
  const textEl=card.querySelector('.task-text');
  if(val&&val!==t.content){
    t.content=val;
    textEl.textContent=val;
    save();
    toast('수정됐어요');
  }
  textEl.classList.remove('editing');
  inputEl.classList.remove('active');
  card.setAttribute('draggable','true');
}
function cancelInlineEdit(id, inputEl){
  const card=inputEl.closest('.task-card');
  const textEl=card.querySelector('.task-text');
  textEl.classList.remove('editing');
  inputEl.classList.remove('active');
  card.setAttribute('draggable','true');
}
function toggleDone(id){
  const t=(S.tasks[wk]||[]).find(x=>String(x.id)===String(id));
  if(t){t.done=!t.done;save();renderDaily();}
}
function delTask(id){
  S.tasks[wk]=(S.tasks[wk]||[]).filter(x=>String(x.id)!==String(id));
  save();renderDaily();toast('삭제됐어요');
}
function carryNext(id){
  const t=(S.tasks[wk]||[]).find(x=>String(x.id)===String(id));
  if(!t)return;
  const nwk=getWkKey2(wkOff+1);
  if(!S.tasks[nwk])S.tasks[nwk]=[];
  S.tasks[nwk].push({...t,id:mkId(),date:nwk,carriedFrom:wk,done:false,isNext:true,order:S.tasks[nwk].length});
  S.tasks[wk]=S.tasks[wk].filter(x=>String(x.id)!==String(id));
  save();renderDaily();toast('차주로 이월됐어요');
}

function attachFile(id){
  const input=document.createElement('input');
  input.type='file';
  input.accept='image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip';
  input.multiple=true;
  input.onchange=()=>{
    const files=Array.from(input.files);
    if(!files.length)return;
    const t=(S.tasks[wk]||[]).find(x=>String(x.id)===String(id));
    if(!t)return;
    if(!t.files)t.files=[];
    let pending=files.length;
    files.forEach(file=>{
      if(file.size>5*1024*1024){toast('5MB 이하 파일만 첨부 가능해요');pending--;if(!pending){save();renderDaily();}return;}
      const reader=new FileReader();
      reader.onload=e=>{
        t.files.push({name:file.name,type:file.type,data:e.target.result});
        pending--;
        if(!pending){save();renderDaily();toast('파일이 첨부됐어요');}
      };
      reader.readAsDataURL(file);
    });
  };
  input.click();
}
function removeFile(taskId,fileIdx){
  const t=(S.tasks[wk]||[]).find(x=>String(x.id)===String(taskId));
  if(!t||!t.files)return;
  t.files.splice(fileIdx,1);
  save();renderDaily();
}
function openFile(taskId,fileIdx){
  const t=(S.tasks[wk]||[]).find(x=>String(x.id)===String(taskId));
  if(!t||!t.files||!t.files[fileIdx])return;
  const f=t.files[fileIdx];
  const a=document.createElement('a');
  a.href=f.data;a.download=f.name;a.click();
}

function renderCard(t){
  const sec=taskSec(t);
  const isIssue=(t.base==='issue');
  const chips=[
    t.client?`<span class="chip chip-client">${esc(t.client)}</span>`:'',
    `<span class="chip ${SEC_CHIP[sec]||'chip-etc'}">${BASE_S[t.base]||''}</span>`,
    t.carriedFrom?`<span class="chip chip-carried">이월</span>`:'',
    (t.isNext&&!t.carriedFrom)?`<span class="chip" style="background:var(--gray-bg);color:var(--gray-text)">차주</span>`:''
  ].filter(Boolean).join('');
  const sid=t.id;
  const carryBtn=(!t.done&&!t.isNext&&!isIssue)?`<button class="ia" onclick="carryNext('${sid}')" title="차주이월">→</button>`:'';
  const files=t.files||[];
  const fileList=files.length?`<div class="attach-list">${files.map((f,i)=>{
    const isImg=f.type&&f.type.startsWith('image/');
    const thumb=isImg?`<img class="attach-img-thumb" src="${f.data}">`:
      `<span style="font-size:11px;flex-shrink:0">📎</span>`;
    return `<div class="attach-item" onclick="openFile('${sid}',${i})">
      ${thumb}
      <span class="attach-name">${esc(f.name)}</span>
      <span class="attach-del" onclick="event.stopPropagation();removeFile('${sid}',${i})">✕</span>
    </div>`;
  }).join('')}</div>`:'';
  const attachBtn=isIssue?`<button class="ia" onclick="attachFile('${sid}')" title="파일 첨부">⊕</button>`:'';
  return `<div class="task-card" draggable="true" data-id="${sid}"
    ondragstart="dStart(event,'${sid}')" ondragover="dOver(event,'${sid}')" ondrop="dDrop(event,'${sid}')" ondragend="dEnd()">
    <span class="drag-handle">⋮⋮</span>
    <div class="cb${t.done?' checked':''}" onclick="toggleDone('${sid}')"></div>
    <div class="task-body">
      <div class="task-text${t.done?' done':''}" ondblclick="startInlineEdit('${sid}',this)" title="더블클릭으로 편집">${esc(t.content)}</div>
      <input class="task-inline-input" data-id="${sid}"
        onblur="commitInlineEdit('${sid}',this)"
        onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}else if(event.key==='Escape'){cancelInlineEdit('${sid}',this)}">
      <div class="task-chips">
        <span class="pri-dot" style="background:${PRI_COLOR[t.pri||'mid']}"></span>
        ${chips}
      </div>
      ${fileList}
    </div>
    <div class="task-actions">
      ${attachBtn}
      ${carryBtn}
      <button class="ia del" onclick="delTask('${sid}')">✕</button>
    </div>
  </div>`;
}

function setView(btn,v){
  document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');curView=v;renderDaily();
}

function renderDaily(){
  const list=document.getElementById('task-list');
  const tasks=S.tasks[wk]||[];
  if(!tasks.length){list.innerHTML='<div class="empty">아직 등록된 업무가 없어요.<br>위에서 업무를 추가해보세요.</div>';return;}

  let groups={};
  if(curView==='week'){
    tasks.forEach(t=>{const g=t.isNext?'__next__':t.date;(groups[g]||(groups[g]=[])).push(t)});
  } else {
    const td=tasks.filter(t=>!t.isNext&&t.date===todayStr);
    const nx=tasks.filter(t=>t.isNext);
    if(td.length)groups[todayStr]=td;
    if(nx.length)groups['__next__']=nx;
  }

  const keys=Object.keys(groups).sort((a,b)=>{
    if(a==='__next__')return 1;if(b==='__next__')return -1;return a<b?-1:1;
  });

  list.innerHTML=keys.map(k=>{
    const items=[...groups[k]].sort((a,b)=>(a.order||0)-(b.order||0));
    const lbl=k==='__next__'?'차주 예정':fmtD(k);
    const done=items.filter(t=>t.done).length;
    return `<div class="day-group">
      <div class="day-head">
        <span class="day-lbl">${lbl}</span>
        <span class="day-rule"></span>
        <span class="day-count">${done}/${items.length}</span>
      </div>
      ${items.map(t=>renderCard(t)).join('')}
    </div>`;
  }).join('');
}

function dStart(ev,id){dragId=id;ev.currentTarget.classList.add('dragging')}
function dOver(ev,id){ev.preventDefault();if(id===dragId)return;document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over'));ev.currentTarget.classList.add('drag-over')}
function dDrop(ev,targetId){
  ev.preventDefault();document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over'));
  if(String(dragId)===String(targetId))return;
  const tasks=S.tasks[wk]||[];
  const fi=tasks.findIndex(t=>String(t.id)===String(dragId)),ti=tasks.findIndex(t=>String(t.id)===String(targetId));
  if(fi<0||ti<0)return;
  const [item]=tasks.splice(fi,1);tasks.splice(ti,0,item);
  tasks.forEach((t,i)=>t.order=i);
  save();renderDaily();
}
function dEnd(){document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('dragging','drag-over'));dragId=null}

function renderReport(){
  const tasks=S.tasks[wk]||[];
  const body=document.getElementById('report-body');
  if(!body)return;
  body.innerHTML=SEC_ORDER.map(s=>{
    const items=tasks.filter(t=>taskSec(t)===s);
    return `<div class="rs-card">
      <div class="rs-head"><span class="rs-dot" style="background:${SEC_DOT[s]}"></span>${SEC_LBL[s]}</div>
      ${items.length?items.map(t=>`<div class="rs-item">- ${t.client?`<strong style="font-weight:500">${esc(t.client)}</strong> : `:''}${esc(t.content)}</div>`).join(''):'<div class="rs-none">없음</div>'}
    </div>`;
  }).join('');
}
function buildTxt(){
  const tasks=S.tasks[wk]||[];
  let lines=[`<${getFullLabel(wk)}>\n`];
  SEC_ORDER.forEach(s=>{
    lines.push(`● ${SEC_LBL[s]}`);
    const items=tasks.filter(t=>taskSec(t)===s);
    if(!items.length)lines.push('');
    else items.forEach(t=>lines.push(t.client?`- ${t.client} : ${t.content}`:`- ${t.content}`));
    lines.push('');
  });
  return lines.join('\n');
}
function copyReport(){navigator.clipboard.writeText(buildTxt()).then(()=>toast('복사됐어요!'))}

function renderMonthly(){
  const now=new Date();
  const month=now.getMonth(),year=now.getFullYear();

  const weekKeys=[];
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const cur=new Date(firstDay);
  const dow=cur.getDay();
  cur.setDate(cur.getDate()-(dow===0?6:dow-1));
  while(cur<=lastDay){
    const wKey=localDate(cur);
    if(!weekKeys.includes(wKey))weekKeys.push(wKey);
    cur.setDate(cur.getDate()+7);
  }

  const allTasks=[];
  weekKeys.forEach(wKey=>(S.tasks[wKey]||[]).forEach(t=>allTasks.push({...t,wKey})));

  const realTasks=allTasks.filter(t=>!t.isNext);
  const total=realTasks.length;
  const done=realTasks.filter(t=>t.done).length;
  const rate=total?Math.round(done/total*100):0;
  const clients=new Set(realTasks.map(t=>t.client).filter(Boolean)).size;

  document.getElementById('monthly-stats').innerHTML=`
    <div class="stat-card"><div class="stat-lbl">총 업무</div><div class="stat-val">${total}</div><div class="stat-sub">이번 달 등록</div></div>
    <div class="stat-card"><div class="stat-lbl">완료</div><div class="stat-val">${done}</div><div class="stat-sub">처리됨</div></div>
    <div class="stat-card"><div class="stat-lbl">완료율</div><div class="stat-val">${rate}%</div><div class="stat-sub">달성률</div></div>
    <div class="stat-card"><div class="stat-lbl">활성 고객사</div><div class="stat-val">${clients}</div><div class="stat-sub">이번 달</div></div>`;

  const wLabels=weekKeys.map((_,i)=>`${i+1}주차`);
  const wDone=weekKeys.map(k=>(S.tasks[k]||[]).filter(t=>!t.isNext&&t.done).length);
  const wTotal=weekKeys.map(k=>(S.tasks[k]||[]).filter(t=>!t.isNext).length);

  if(chartW)chartW.destroy();
  chartW=new Chart(document.getElementById('chart-weekly'),{
    type:'bar',
    data:{labels:wLabels,datasets:[
      {label:'완료',data:wDone,backgroundColor:'#1D9E75',borderRadius:4},
      {label:'전체',data:wTotal,backgroundColor:'rgba(0,0,0,0.08)',borderRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:12}}},y:{beginAtZero:true,ticks:{stepSize:1,font:{size:12}},grid:{color:'rgba(0,0,0,0.05)'}}}}
  });

  const clientMap={};
  realTasks.forEach(t=>{if(t.client)clientMap[t.client]=(clientMap[t.client]||0)+1});
  const cNames=Object.keys(clientMap).sort((a,b)=>clientMap[b]-clientMap[a]);
  const cVals=cNames.map(n=>clientMap[n]);
  const colors=['#378ADD','#1D9E75','#D85A30','#D4537E','#7F77DD','#BA7517','#639922','#888780'];

  const barH=Math.max(180, cNames.length*44+40);
  document.getElementById('client-chart-wrap').style.height=barH+'px';

  if(chartC)chartC.destroy();
  chartC=new Chart(document.getElementById('chart-client'),{
    type:'bar',
    data:{labels:cNames,datasets:[{data:cVals,backgroundColor:cNames.map((_,i)=>colors[i%colors.length]),borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{stepSize:1,font:{size:12}},grid:{color:'rgba(0,0,0,0.05)'}},y:{grid:{display:false},ticks:{font:{size:12}}}}}
  });
}

function saveName(){
  const v=document.getElementById('s-username').value.trim();
  S.username=v||'';
  save();
}
function addClient(){
  const name=document.getElementById('nc-name').value.trim();
  const sec=document.getElementById('nc-sec').value;
  if(!name)return;
  S.clients[name]=sec;
  document.getElementById('nc-name').value='';
  save();renderClSettings();renderClientSel();
}
function rmClient(name){
  delete S.clients[name];
  save();renderClSettings();renderClientSel();toast('고객사가 삭제됐어요');
}
function upClient(name,sec){S.clients[name]=sec;save()}
function renderClSettings(){
  const el=document.getElementById('cl-list');
  const names=Object.keys(S.clients);
  if(!names.length){
    el.innerHTML='<div style="padding:12px 16px;font-size:13px;color:var(--text3)">등록된 고객사가 없어요.</div>';
    return;
  }
  const groups=[
    {key:'gov', label:'정부/민간', dot:'#378ADD'},
    {key:'sub', label:'구독제',   dot:'#1D9E75'},
    {key:'issue',label:'이슈사항', dot:'#E24B4A'},
    {key:'etc', label:'기타',     dot:'#888780'}
  ];
  const secOpts=['gov','sub','issue','etc'].map(v=>`<option value="${v}">${{gov:'정부/민간',sub:'구독제',issue:'이슈',etc:'기타'}[v]}</option>`).join('');
  el.innerHTML=groups.map(g=>{
    const members=names.filter(n=>S.clients[n]===g.key);
    if(!members.length)return '';
    const rows=members.map(n=>`
      <div class="cl-row">
        <span class="cl-name">${esc(n)}</span>
        <select class="cl-sel" onchange="upClient('${esc(n)}',this.value)">
          ${['gov','sub','issue','etc'].map(v=>`<option value="${v}"${S.clients[n]===v?' selected':''}>${{gov:'정부/민간',sub:'구독제',issue:'이슈',etc:'기타'}[v]}</option>`).join('')}
        </select>
        <button class="cl-del" onclick="rmClient('${esc(n)}')">✕</button>
      </div>`).join('');
    return `<div class="cl-group">
      <div class="cl-group-head">
        <span class="cl-group-dot" style="background:${g.dot}"></span>
        <span class="cl-group-label">${g.label}</span>
        <span class="cl-group-count">${members.length}개</span>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

function setTab(btn,tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['daily','report','monthly','settings'].forEach(p=>{
    document.getElementById('pane-'+p).style.display=p===tab?'':'none';
  });
  if(tab==='report')renderReport();
  if(tab==='monthly')renderMonthly();
  if(tab==='settings'){
    document.getElementById('s-username').value=S.username||'';
    renderClSettings();
  }
}

function init(){
  wk=getWkKey2(wkOff);
  todayStr=localDate(new Date());
  document.getElementById('wkLabel').textContent=getWkLabel(wk);
  document.getElementById('f-date').value=todayStr;
  if(!S.tasks[wk])S.tasks[wk]=[];
  renderClientSel();renderDaily();
}

load();
Object.keys(S.tasks||{}).forEach(wkKey=>{
  (S.tasks[wkKey]||[]).forEach(t=>{ t.id=String(t.id); });
});
if(!Object.keys(S.clients).length){
  S.clients={'케이오알이':'gov','로보메이션':'sub','케이웨이':'sub','케이싹':'sub','떼루아본':'sub'};
}
init();
</script>
